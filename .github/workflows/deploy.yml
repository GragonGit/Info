name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Contact data
        env:
          SET_CONTACT: ${{ secrets.SET_CONTACT }}
        run: |
          mkdir dist
          cp index.html styles.css dist/
          sed "s|__SET_CONTACT__|$SET_CONTACT|g" obf.js > dist/obf.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
